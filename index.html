<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador QR</title>
    <link
      rel="icon" href="https://i.imgur.com/uHrgKte.png" type="image/png"/>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>
    <style>

      ::-webkit-scrollbar {
        display: none;
      }

      html,
      body {
        scrollbar-width: none;
      }

      body {
        -ms-overflow-style: none;
      }
      body {
        background: url("https://i.imgur.com/z4guq1U.jpeg") no-repeat center center fixed;
        background-size: cover;
        color: transparent;
        text-align: center;
        font-family: Arial;
        padding: 20px;
        margin: 0;
      }

      @media (max-width: 600px) {
        body {
          background: url("https://i.imgur.com/tdiVvNP.jpeg") no-repeat center center;
          background-size: cover;
          background-attachment: scroll;
          min-height: 100vh;
        }
      }
      .container {
        max-width: 500px;
        margin: auto;
      }
      canvas {
        width: 100%;
        max-width: 320px;
        height: auto;
        margin-top: 20px;
      }
      button {
        background: #333;
        color: #00fbff;
        border: 2px solid #00fbff;
        font-weight: bold;
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #00FBFF;
        color: black;
        border-color: #00FBFF;
      }

      input[type="color"] {
        width: 60px;
        height: 40px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: none;
      }

      input[type="color"]::-webkit-color-swatch,
      input[type="color"]::-moz-color-swatch {
        border-radius: 8px;
        border: 2px solid #333;
      }

      .checkboxBox {
        display: center;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
        cursor: pointer;
      }

      .checkboxBox span {
        color: #00fbff;
      }

      .checkboxBox input {
        width: auto;
      }

      .checkboxBox input:checked ~ span {
        color: #c800ff;
        text-shadow: 0 0 5px #c800ff;
      }

      .checkboxBox label {
        cursor: pointer;
        color: #00fbff;
        font-size: 14px;
      }

      select {
        width: 100%;
        padding: 10px;
        margin: 10px;
        width: 100%;
        max-width: 300px;
        color: #00fbff;
        border: 2px solid #00d5ff;
        background: #333;
        border-radius: 8px;
      }

      .inputBox {
        position: relative;
        width: 100%;
        max-width: 300px;
        margin: 18px auto;
      }

      .inputBox input {
        width: 100%;
        padding: 12px;
        background: #333;
        border: 2px solid #00d5ff;
        color: #00d5ff;
        border-radius: 8px;
        outline: none;
      }

      .inputBox span {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #00d5ff;
        pointer-events: none;
        transition: 0.3s;
      }

      label {
        display: flexbox;
        margin-top: 20px;
        font-size: 16px;
        color: #00fbff; 
      }

      h1 {
        color: #00fbff;
      }

      p{
        color: #00fbff;
      }

      .inputBox input:focus ~ span,
      .inputBox input:valid ~ span {
        top: -8px;
        font-size: 12px;
        padding: 0 5px;
        color: #00d5ff;
      }
      .about-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: #00fbff;
        border: 2px solid #00fbff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
        z-index: 1000;
      }
      .about-btn:hover {
        background: #00fbff;
        color: black;
      }
      .about-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000cc;
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
      }

      .about-panel.active {
        opacity: 1;
        pointer-events: all;
      }

      .about-content {
        background: #1f1f1f;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        width: 90%;
        max-width: 300px;
        border: 2px solid #00fbff;
      }

      .about-content h2 {
        color: #d000ff;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 15px 0;
      }

      .links a {
        text-decoration: none;
        color: #00fbff;
        background: #333;
        padding: 10px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .links a:hover {
        background: #00fbff;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Generador QR</h1>

      <div class="inputBox" id="inputPrincipal">
        <input type="text" id="texto" required />
        <span>Introduce Texto o URL</span>
      </div>
      <div id="camposExtra"></div>
      <label>Tipo de QR:</label>
      <select id="tipo" onchange="cambiarTipo()">
        <option value="texto">Texto / URL</option>
        <option value="contacto">Contacto</option>
        <option value="wifi">WiFi</option>
      </select><br />

      <label>Diseño:</label>
      <select id="estilo">
        <option value="normal">Normal</option>
        <option value="lineas">Líneas internas</option>
        <option value="capsulas">Cápsulas</option></select
      ><br />
      
      <label>Color:</label>
      <input type="color" id="color" value="#000000" /><br />

      <label class="checkboxBox">
        <input type="checkbox" id="fondo"/>
        <span>Con Fondo</span>
      </label
      ><br />
      <label class="checkboxBox">
      <input type="checkbox" id="logoCheck"     onchange="toggleLogoInput()" />
      <span>Agregar logotipo</span>
      </label> 
      <div id="logoInput" style="display:none; margin-top:10px;">
      <input type="file" id="logoFile" accept="image/*" />
      </div> <br />
      <button onclick="generarQR()">Generar QR</button>
      <button onclick="descargar()">Descargar QR</button>
      <br />
      <canvas id="canvas"></canvas>
    </div>
    <div class="about-btn" onclick="toggleAbout()">ℹ</div>
    <div class="about-panel" id="aboutPanel">
      <div class="about-content">
        <h2>Acerca de</h2>
        <p>Desarrollado por DIEGOKUGAMER541</p>
        <div class="links">
        <a href="https://diegokugamer541.github.io/GENERADOR-DE-MANIFEST" target="_blank">Generador de Manifest</a>
        <a href="https://diegokugamer541.github.io/TEXTO-A-IMAGEN" target="_blank">Texto a imagen</a>
        <a href="https://diegokugamer541.github.io/Categorias/" target="_blank">Categorias de Twitch y Kick</a>
        <a href="https://bedpks.com" target="_blank">BedPKS</a>
        <a href="https://youtube.com/@diegokugamer541" target="_blank">YouTube</a>
        <a href="https://twitch.tv/diegokugamer541" target="_blank">Twitch</a>
        <a href="https://discord.gg/AMCtjwVNvk"   target="_blank">Discord Minecraft</a>
        <a href="https://github.com/DIEGOKUGAMER541" target="_blank">GitHub</a>
        <a href="https://youtube.com/@ipodcraft" target="_blank">Youtube Ipodcraft</a>
        <a href="https://twitch.tv/ipodcraftyt" target="_blank">Twitch IpodcraftYT</a>
        <a href="https://ipodcraft.com" target="_blank"> Ipodcraft web</a>
        </div>
        <button onclick="toggleAbout()">Cerrar</button></div>
      </div>
    </div>
    <script>
      function cambiarTipo() {
        const tipo = document.getElementById("tipo").value;
        const contenedor = document.getElementById("camposExtra");
        const inputPrincipal = document.getElementById("inputPrincipal");

        if (tipo === "contacto") {
          inputPrincipal.style.display = "none";

          contenedor.innerHTML = `
      <div class="inputBox">
        <input type="text" id="nombre" required>
        <span>Nombre</span>
      </div>

      <div class="inputBox">
        <input type="text" id="telefono" required>
        <span>Teléfono</span>
      </div>

      <div class="inputBox">
        <input type="text" id="direccion" required>
        <span>Dirección</span>
      </div>
    `;
        } else if (tipo === "wifi") {
          inputPrincipal.style.display = "none";

          contenedor.innerHTML = `
      <div class="inputBox">
        <input type="text" id="ssid" required>
        <span>Nombre de la red (SSID)</span>
      </div>

      <div class="inputBox">
        <input type="text" id="password" required>
        <span>Contraseña</span>
      </div>

      <label>Seguridad:</label>
      <select id="seguridad">
        <option value="WPA">WPA/WPA2</option>
        <option value="WEP">WEP</option>
        <option value="nopass">Sin contraseña</option>
      </select>
    `;
        } else {
          inputPrincipal.style.display = "block";
          contenedor.innerHTML = "";
        }
      }
    function generarQR() {
      const tipo = document.getElementById("tipo").value;
      const color = document.getElementById("color").value;
      const fondo = document.getElementById("fondo").checked;
      const estilo = document.getElementById("estilo").value;
    
      let texto = "";
    
      if (tipo === "texto") {
        texto =
          document.getElementById("texto").value || "https://bedpks.com";
      }
    
      if (tipo === "contacto") {
        const nombre = document.getElementById("nombre").value || "";
        const telefono = document.getElementById("telefono").value || "";
        const direccion = document.getElementById("direccion").value || "";
      
        texto = `MECARD:N:${nombre};TEL:${telefono};ADR:${direccion};;`;
      }
    
      if (tipo === "wifi") {
        const ssid = document.getElementById("ssid").value || "";
        const password = document.getElementById("password").value || "";
        const seguridad = document.getElementById("seguridad").value;
      
        texto = `WIFI:T:${seguridad};S:${ssid};P:${password};;`;
      }
    
      const qr = qrcode(0, "H");
      qr.addData(texto);
      qr.make();
    
      const canvas = document.getElementById("canvas");
      const size = Math.min(window.innerWidth * 0.8, 400);
    
      canvas.width = size;
      canvas.height = size;
    
      const ctx = canvas.getContext("2d");
      const count = qr.getModuleCount();
      const cell = size / count;
    
      ctx.clearRect(0, 0, size, size);
    
      if (fondo) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, size, size);
      }
    
      ctx.fillStyle = color;

  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (!qr.isDark(r, c)) continue;

      const x = c * cell;
      const y = r * cell;

      const isFinder =
        (r < 7 && c < 7) ||
        (r < 7 && c > count - 8) ||
        (r > count - 8 && c < 7);

      if (isFinder) {
        ctx.fillRect(x, y, cell, cell);
        continue;
      }

      if (estilo === "normal") {
        ctx.fillRect(x, y, cell, cell);
      } else if (estilo === "lineas") {
        const sub = 3;
        const mini = cell / sub;

        for (let i = 0; i < sub; i++) {
          for (let j = 0; j < sub; j++) {
            const pattern = (r + c + i + j) % 2;

            if (pattern === 0) {
              ctx.fillRect(
                x + j * mini,
                y + i * mini,
                mini * 0.9,
                mini * 0.3,
              );
            } else {
              ctx.fillRect(
                x + j * mini,
                y + i * mini,
                mini * 0.3,
                mini * 0.9,
              );
            }
          }
        }
      } else if (estilo === "capsulas") {
        const cx = x + cell / 2;
        const cy = y + cell / 2;

        const pattern = (r + c) % 2;

        if (pattern === 0) {
          ctx.fillRect(
            x + cell * 0.1,
            cy - cell * 0.15,
            cell * 0.8,
            cell * 0.3,
          );
        } else {
          ctx.fillRect(
            cx - cell * 0.15,
            y + cell * 0.1,
            cell * 0.3,
            cell * 0.8,
          );
        }
      }
    }
  }

  const usarLogo = document.getElementById("logoCheck").checked;
  const file = document.getElementById("logoFile").files[0];
        if (usarLogo && file) {
          const img = new Image();
          const reader = new FileReader();
        
          reader.onload = function(e) {
            img.src = e.target.result;
          };
        
          img.onload = function() {
            const logoSize = size * 0.25;
            const x = (size - logoSize) / 2;
            const y = (size - logoSize) / 2;
          
            ctx.drawImage(img, x, y, logoSize, logoSize);
          };
        
          reader.readAsDataURL(file);
        }
      }
      function toggleLogoInput() {
      const check = document.getElementById("logoCheck").checked;
      document.getElementById("logoInput").style.display =   check ? "block" : "none";
      }
      function descargar() {
        const canvas = document.getElementById("canvas");
        const link = document.createElement("a");

        let tipo = document.getElementById("tipo").value;
        let nombre = "";

        if (tipo === "texto") nombre = document.getElementById("texto").value;
        if (tipo === "contacto")
          nombre = document.getElementById("nombre")?.value;
        if (tipo === "wifi") nombre = document.getElementById("ssid")?.value;

        if (!nombre) nombre = "MI-QR";

        nombre = nombre.replace(/[\\/:*?"<>|]/g, "");

        link.download = nombre + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }
      function toggleAbout() {
      const panel = document.getElementById("aboutPanel");
      panel.classList.toggle("active");
      }
    </script>
  </body>
</html>
