<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador QR</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>

<style>
body {
background: url("https://i.imgur.com/z4guq1U.jpeg") no-repeat center center fixed;
  background-size: cover;
  color:white;
  text-align:center;
  font-family:Arial;
  padding:20px;
  margin:0;
}

/* Contenedor */
.container {
  max-width: 500px;
  margin: auto;
}

/* Canvas responsive */
canvas {
  width: 100%;
  max-width: 320px;
  height: auto;
  margin-top:20px;
}

/* Botones */
button {
  background: #1f1f1f;
  color: white;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
  max-width: 300px;
  margin: 5px auto;
  display: block;
}

button:hover {
  background: #d4ff00;
  color: black;
  border-color: #d4ff00;
}

/* Color picker */
input[type="color"] {
  width: 60px;
  height: 40px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: none;
}

input[type="color"]::-webkit-color-swatch {
  border-radius: 8px;
  border: 2px solid #333;
}

input[type="color"]::-moz-color-swatch {
  border-radius: 8px;
  border: 2px solid #333;
}

/* Select */
select {
  padding:10px;
  border-radius:8px;
  margin:10px;
  width: 100%;
  max-width: 300px;
}

/* Input animado */
.inputBox {
  position: relative;
  width: 100%;
  max-width: 300px;
  margin: 10px auto;
}

.inputBox input {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 2px solid #d4ff00;
  color: #d4ff00;
  border-radius: 8px;
  outline: none;
}

.inputBox span {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(212,255,0,0.6);
  pointer-events: none;
  transition: 0.3s;
}

.inputBox input:focus ~ span,
.inputBox input:valid ~ span {
  top: -8px;
  font-size: 12px;
  padding: 0 5px;
  color: #d4ff00;
}

/* 📱 Modo móvil */
@media (max-width: 600px) {
  h2 {
    font-size: 22px;
  }

  body {
    padding: 10px;
  }

  input[type="color"] {
    width: 80px;
    height: 50px;
  }
}
</style>

</head>

<body>

<div class="container">

<h2>Generador QR</h2>

<div class="inputBox">
  <input type="text" id="texto" required>
  <span>Introduce texto o URL</span>
</div>

<label>Color:</label>
<input type="color" id="color" value="#000000"><br>

<label>Diseño:</label>
<select id="estilo">
  <option value="normal">Normal</option>
  <option value="lineas">Líneas internas</option>
  <option value="capsulas">Cápsulas</option>
</select><br>

<label>
  <input type="checkbox" id="fondo" checked>
  Con Fondo
</label><br>

<button onclick="generarQR()">Generar QR</button>
<button onclick="descargar()">Descargar QR</button>

<br>
<canvas id="canvas"></canvas>

</div>

<script>
function generarQR() {

  const texto = document.getElementById("texto").value || "https://bedpks.com";
  const color = document.getElementById("color").value;
  const fondo = document.getElementById("fondo").checked;
  const estilo = document.getElementById("estilo").value;

  const qr = qrcode(0, 'H');
  qr.addData(texto);
  qr.make();

  const canvas = document.getElementById("canvas");

  // 🔥 Tamaño dinámico según pantalla
  const size = Math.min(window.innerWidth * 0.8, 400);
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");

  const count = qr.getModuleCount();
  const cell = size / count;

  ctx.clearRect(0,0,size,size);

  if (fondo) {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, size, size);
  }

  ctx.fillStyle = color;

  for (let r=0;r<count;r++){
    for (let c=0;c<count;c++){

      if(!qr.isDark(r,c)) continue;

      const x = c*cell;
      const y = r*cell;

      const isFinder =
        (r<7 && c<7) ||
        (r<7 && c>count-8) ||
        (r>count-8 && c<7);

      if(isFinder){
        ctx.fillRect(x,y,cell,cell);
        continue;
      }

      if(estilo === "normal"){
        ctx.fillRect(x,y,cell,cell);
      }

      else if(estilo === "lineas"){
        const sub = 3;
        const mini = cell / sub;

        for(let i=0;i<sub;i++){
          for(let j=0;j<sub;j++){

            const pattern = (r + c + i + j) % 2;

            if(pattern === 0){
              ctx.fillRect(x + j*mini, y + i*mini, mini*0.9, mini*0.3);
            } else {
              ctx.fillRect(x + j*mini, y + i*mini, mini*0.3, mini*0.9);
            }

          }
        }
      }

      else if(estilo === "capsulas"){
        const cx = x + cell/2;
        const cy = y + cell/2;

        const pattern = (r + c) % 2;

        if(pattern === 0){
          ctx.fillRect(x + cell*0.1, cy - cell*0.15, cell*0.8, cell*0.3);
        } else {
          ctx.fillRect(cx - cell*0.15, y + cell*0.1, cell*0.3, cell*0.8);
        }
      }

    }
  }
}

function descargar(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "MI-QR.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
